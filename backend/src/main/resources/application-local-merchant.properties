# ==========================================
# 商家端/管理后台端本地配置（端口 8080）
# 启动方式：--spring.profiles.active=local-merchant
# ==========================================
server.port=8080
upload.base-url=${UPLOAD_BASE_URL:}
jwt.secret=social-retail-2026-secret-key-change-in-production

# 数据库（与用户端共用同一数据库）
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/social_retail_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 支付宝（本地测试按需填写）
#alipay.app-id=你的appId
#alipay.private-key=你的应用私钥
#alipay.alipay-public-key=支付宝公钥
# alipay.notify-url 由 ALIPAY_NOTIFY_URL 配置，例如：
# https://你的natapp域名/api/pay/alipay/notify
#alipay.return-url=http://你的natapp地址/pay-result
