spring.application.name=social-retail

# ==========================================
# 服务端口
# ==========================================
server.port=8080

# ==========================================
# 环境配置
# ==========================================
spring.profiles.active=local

# ==========================================
# SQL 初始化模式
# ==========================================
spring.sql.init.mode=never

# ==========================================
# JPA 自动建表
# ==========================================
spring.jpa.hibernate.ddl-auto=none

# ==========================================
# 数据源配置
# ==========================================
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=jdbc:mysql://localhost:3306/social_retail_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowMultiQueries=true
#spring.datasource.username=root
#spring.datasource.password=root

# ==========================================
# MyBatis-Plus 配置
# ==========================================
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# ==========================================
# Redis 配置
# ==========================================
#spring.redis.host=localhost
#spring.redis.port=6379

# ==========================================
# 文件上传
# ==========================================
#spring.servlet.multipart.max-file-size=10MB
#spring.servlet.multipart.max-request-size=20MB

# ==========================================
# JWT 配置
# ==========================================
jwt.secret=social-retail-2026-secret-key-change-in-production
jwt.expiration=86400000

# ==========================================
# 短信配置
# ==========================================
sms.mock.enabled=true
sms.code.length=6
sms.code.expire-seconds=60
sms.rate-limit.interval-seconds=60
