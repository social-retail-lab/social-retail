spring.application.name=backend
server.address=0.0.0.0

# 默认激活用户端 local 配置（商家端通过 --spring.profiles.active=local-merchant 启动）
spring.profiles.active=local

# Database initialization
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath:mapper/*.xml,classpath:mapper/**/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# Redis is currently optional
#spring.redis.host=localhost
#spring.redis.port=6379

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
upload.path=${UPLOAD_PATH:}

# JWT
jwt.secret=${JWT_SECRET:local-only-change-me-before-production-2026}
jwt.expiration=86400000
jwt.expiration-millis=604800000

# Mock SMS
sms.mock.enabled=true
sms.code.length=6
sms.code.expire-seconds=60
sms.rate-limit.interval-seconds=60

# Order timeout cancellation
order.auto-cancel.timeout-minutes=30
order.auto-cancel.scan-delay-ms=60000
order.auto-cancel.batch-size=100

# Alipay sandbox: keys must be injected through environment variables
alipay.app-id=${ALIPAY_APP_ID:}
alipay.private-key=${ALIPAY_PRIVATE_KEY:}
alipay.alipay-public-key=${ALIPAY_PUBLIC_KEY:}
alipay.server-url=${ALIPAY_SERVER_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
alipay.notify-url=${ALIPAY_NOTIFY_URL:http://k626bf44.natappfree.cc/api/pay/alipay/notify}
alipay.return-url=${ALIPAY_RETURN_URL:http://member.zyz.com/memberOrder.html}
alipay.mobile-return-url=${ALIPAY_MOBILE_RETURN_URL:http://k626bf44.natappfree.cc/alipay-sandbox-test.html}
alipay.charset=UTF-8
alipay.sign-type=RSA2
alipay.format=json
