spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=8081
server.address=0.0.0.0
# Honor X-Forwarded-Host/X-Forwarded-Proto supplied by the frontend reverse proxy.
# This keeps generated image URLs on the public HTTPS origin instead of exposing
# an internal http://172.x address that browsers block as mixed content.
server.forward-headers-strategy=framework

# 默认激活用户端 local 配置（商家端通过 --spring.profiles.active=local-merchant 启动）
spring.profiles.active=local

# Database initialization
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# Data source
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath:mapper/*.xml,classpath:mapper/**/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# Redis (Spring Boot 3 uses the spring.data.redis prefix)
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2s}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.lettuce.shutdown-timeout=100ms

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
file.upload.max-count=9
file.upload.max-size-bytes=10485760
upload.path=${UPLOAD_PATH:H:/asocial/social-retail/backend/src/main/resources/static/uploads}
upload.base-url=${UPLOAD_BASE_URL}

# Distributor sharing and internal commission API
internal.api-token=${INTERNAL_API_TOKEN:}
commission.settle-delay-ms=${COMMISSION_SETTLE_DELAY_MS:60000}
distributor.id-card-storage-path=${DISTRIBUTOR_ID_CARD_STORAGE_PATH:G:/social_retail_lab/social-retail/backend/src/main/resources/static/distributor/id}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.expiration-millis=604800000

# Mock SMS
sms.mock.enabled=true
sms.code.length=6
sms.code.expire-seconds=60
sms.rate-limit.interval-seconds=60

# Order timeout cancellation
order.auto-cancel.timeout-minutes=30
order.auto-cancel.scan-delay-ms=60000
order.auto-cancel.batch-size=100

# Alipay sandbox
alipay.app-id=${ALIPAY_APP_ID}
alipay.private-key=${ALIPAY_PRIVATE_KEY}
alipay.alipay-public-key=${ALIPAY_PUBLIC_KEY}
alipay.server-url=${ALIPAY_SERVER_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
alipay.notify-url=${ALIPAY_NOTIFY_URL}
alipay.return-url=${ALIPAY_RETURN_URL}
alipay.mobile-return-url=${ALIPAY_MOBILE_RETURN_URL}
alipay.charset=UTF-8
alipay.sign-type=RSA2
alipay.format=json
