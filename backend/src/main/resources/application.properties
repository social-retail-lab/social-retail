spring.application.name=backend
server.port=8081
server.address=0.0.0.0

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/social_retail_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# JWT（生产环境必须通过 JWT_SECRET 环境变量覆盖开发默认值）
jwt.secret=${JWT_SECRET:local-only-change-me-before-production-2026}
jwt.expiration-millis=604800000
